<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STM32 AI Voice Bridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap"/>
<style>
:root {
  --bg:       #0a0c10;
  --bg2:      #11141c;
  --bg3:      #181d28;
  --border:   #1e2535;
  --border2:  #2a3348;
  --text:     #c8d0e0;
  --text2:    #6b7a99;
  --text3:    #3d4a65;
  --accent:   #00d4ff;
  --accent2:  #0099cc;
  --red:      #ff4455;
  --cyan:     #00ffc8;
  --gray:     #445566;
  --amber:    #ffb830;
  --green:    #00e87a;
  --mono:     'JetBrains Mono', monospace;
  --display:  'Syne', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);}

body {
  display:grid;
  grid-template-rows:auto 1fr auto;
  grid-template-columns:1fr;
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── Scanline overlay ─── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,212,255,0.015) 2px,
    rgba(0,212,255,0.015) 4px
  );
  pointer-events:none;
  z-index:1000;
}

/* ─── Header ─── */
header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  position:sticky;
  top:0;
  z-index:100;
}

.logo {
  display:flex;
  align-items:center;
  gap:.75rem;
}

.logo-icon {
  width:32px;height:32px;
  border:1px solid var(--accent);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
}
.logo-icon::before {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(0,212,255,.15), transparent);
}
.logo-icon svg { width:18px;height:18px; }

.logo-text {
  font-family:var(--display);
  font-size:1.1rem;
  font-weight:800;
  letter-spacing:-.02em;
  color:#fff;
}
.logo-text span { color:var(--accent); }

.header-right {
  display:flex;
  align-items:center;
  gap:1rem;
}

.badge {
  display:flex;
  align-items:center;
  gap:.4rem;
  font-size:.7rem;
  padding:.25rem .6rem;
  border-radius:3px;
  border:1px solid;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.badge.ok   { border-color:var(--green);  color:var(--green);  }
.badge.fail { border-color:var(--red);    color:var(--red);    }
.badge.warn { border-color:var(--amber);  color:var(--amber);  }
.badge .dot {
  width:6px;height:6px;border-radius:50%;
  background:currentColor;
  animation:pulse 2s ease-in-out infinite;
}

@keyframes pulse {0%,100%{opacity:1} 50%{opacity:.3}}

/* ─── Main grid ─── */
main {
  display:grid;
  grid-template-columns:320px 1fr 260px;
  gap:0;
  overflow:hidden;
  height:calc(100vh - 57px - 42px);
}

/* ─── Panels ─── */
.panel {
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.panel:last-child { border-right:none; }

.panel-header {
  padding:.75rem 1rem;
  border-bottom:1px solid var(--border);
  font-size:.65rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--text2);
  background:var(--bg2);
  display:flex;
  align-items:center;
  gap:.5rem;
  flex-shrink:0;
}
.panel-header .dot-accent {
  width:5px;height:5px;border-radius:50%;
  background:var(--accent);
}

.panel-body {
  flex:1;
  overflow-y:auto;
  padding:1rem;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}

/* ─── Center panel (voice control) ─── */
.center-panel {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2rem;
  padding:2rem;
  background:var(--bg);
  position:relative;
  overflow:hidden;
}

/* Crosshair grid background */
.center-panel::before {
  content:'';
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:.4;
}

/* ─── Mic button ─── */
.mic-ring {
  position:relative;
  width:180px;height:180px;
  display:flex;align-items:center;justify-content:center;
  z-index:1;
}

.mic-ring::before, .mic-ring::after {
  content:'';
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(0,212,255,.15);
  animation:ring-expand 3s ease-out infinite;
}
.mic-ring::before { width:100%;height:100%; animation-delay:0s; }
.mic-ring::after  { width:140%;height:140%; animation-delay:1.5s; }

@keyframes ring-expand {
  0%   { transform:scale(.8); opacity:.6; }
  100% { transform:scale(1.2); opacity:0; }
}

.mic-btn {
  width:120px;height:120px;border-radius:50%;
  border:2px solid var(--accent2);
  background:var(--bg3);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  transition:all .2s;
  z-index:1;
}
.mic-btn:hover { border-color:var(--accent); background:var(--bg2); transform:scale(1.04); }
.mic-btn.active {
  border-color:var(--red);
  background:rgba(255,68,85,.08);
  animation:mic-active-pulse 1s ease-in-out infinite;
}
.mic-btn.active::before {
  content:'';
  position:absolute;
  inset:-8px;
  border-radius:50%;
  border:2px solid rgba(255,68,85,.3);
  animation:mic-active-pulse 1s ease-in-out infinite reverse;
}
@keyframes mic-active-pulse {
  0%,100%{box-shadow:0 0 0 0 rgba(255,68,85,.4);}
  50%{box-shadow:0 0 0 16px rgba(255,68,85,0);}
}

.mic-btn svg { width:40px;height:40px; transition:color .2s; }
.mic-btn.active svg { color:var(--red); }

/* ─── Waveform ─── */
.waveform {
  display:flex;
  align-items:center;
  gap:3px;
  height:40px;
  z-index:1;
}
.waveform .bar {
  width:3px;
  background:var(--accent);
  border-radius:2px;
  transform:scaleY(.15);
  transform-origin:center;
  transition:transform .1s;
}
.waveform.active .bar { animation:wave-dance .6s ease-in-out infinite; }
.waveform.active .bar:nth-child(1) { animation-delay:.0s; }
.waveform.active .bar:nth-child(2) { animation-delay:.1s; }
.waveform.active .bar:nth-child(3) { animation-delay:.2s; }
.waveform.active .bar:nth-child(4) { animation-delay:.3s; }
.waveform.active .bar:nth-child(5) { animation-delay:.4s; }
.waveform.active .bar:nth-child(6) { animation-delay:.05s; }
.waveform.active .bar:nth-child(7) { animation-delay:.15s; }
.waveform.active .bar:nth-child(8) { animation-delay:.25s; }
.waveform.active .bar:nth-child(9) { animation-delay:.35s; }
.waveform.active .bar:nth-child(10){ animation-delay:.45s; }
@keyframes wave-dance {
  0%,100%{transform:scaleY(.15)}
  50%{transform:scaleY(1)}
}

/* ─── Status text ─── */
.status-text {
  font-size:.75rem;
  color:var(--text2);
  letter-spacing:.06em;
  text-align:center;
  z-index:1;
  min-height:1.2em;
  transition:color .3s;
}
.status-text.active-text { color:var(--accent); }

/* ─── Command display ─── */
.command-display {
  z-index:1;
  text-align:center;
}
.cmd-label {
  font-family:var(--display);
  font-size:.6rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:.3rem;
}
.cmd-value {
  font-family:var(--display);
  font-size:3.5rem;
  font-weight:800;
  line-height:1;
  transition:all .3s;
}
.cmd-value.A { color:var(--red); text-shadow:0 0 30px rgba(255,68,85,.5); }
.cmd-value.C { color:var(--cyan); text-shadow:0 0 30px rgba(0,255,200,.5); }
.cmd-value.X { color:var(--gray); text-shadow:none; }
.cmd-name {
  font-size:.75rem;
  color:var(--text2);
  margin-top:.3rem;
}

/* ─── Manual command buttons ─── */
.manual-cmds {
  display:flex;
  gap:.5rem;
  z-index:1;
}
.cmd-btn {
  padding:.4rem .9rem;
  border-radius:3px;
  border:1px solid;
  background:transparent;
  cursor:pointer;
  font-family:var(--mono);
  font-size:.75rem;
  font-weight:700;
  letter-spacing:.1em;
  transition:all .15s;
}
.cmd-btn.A { border-color:var(--red);  color:var(--red);  }
.cmd-btn.C { border-color:var(--cyan); color:var(--cyan); }
.cmd-btn.X { border-color:var(--gray); color:var(--gray); }
.cmd-btn:hover { opacity:.7; transform:translateY(-1px); }
.cmd-btn:active { transform:translateY(0); }

/* ─── Left panel: transcript log ─── */
.transcript-entry {
  margin-bottom:.75rem;
  padding:.6rem .75rem;
  border-left:2px solid var(--border2);
  background:var(--bg2);
  border-radius:0 4px 4px 0;
  animation:slide-in .2s ease-out;
}
@keyframes slide-in {
  from{opacity:0;transform:translateX(-6px)}
  to{opacity:1;transform:translateX(0)}
}
.transcript-entry .ts-time {
  font-size:.6rem;
  color:var(--text3);
  margin-bottom:.25rem;
  letter-spacing:.05em;
}
.transcript-entry .ts-text {
  font-size:.8rem;
  color:var(--text);
  line-height:1.5;
}
.transcript-entry.cmd-A { border-color:var(--red); }
.transcript-entry.cmd-C { border-color:var(--cyan); }
.transcript-entry.cmd-X { border-color:var(--gray); }
.transcript-entry .ts-cmd {
  display:inline-block;
  margin-top:.3rem;
  padding:.1rem .4rem;
  border-radius:2px;
  font-size:.65rem;
  font-weight:700;
  letter-spacing:.1em;
}
.cmd-A .ts-cmd { background:rgba(255,68,85,.15); color:var(--red); }
.cmd-C .ts-cmd { background:rgba(0,255,200,.12); color:var(--cyan); }
.cmd-X .ts-cmd { background:rgba(68,85,102,.2);  color:var(--gray); }

/* ─── Right panel: serial monitor ─── */
.serial-line {
  font-size:.7rem;
  padding:.2rem 0;
  border-bottom:1px solid var(--border);
  display:flex;
  gap:.6rem;
  animation:fade-in .15s ease-out;
}
@keyframes fade-in { from{opacity:0} to{opacity:1} }
.serial-line .sl-time { color:var(--text3); flex-shrink:0; }
.serial-line .sl-dir  { flex-shrink:0; font-weight:700; }
.serial-line.tx .sl-dir { color:var(--accent); }
.serial-line.rx .sl-dir { color:var(--green); }
.serial-line.err .sl-dir{ color:var(--red); }
.serial-line .sl-data { color:var(--text2); word-break:break-all; }

/* ─── LED visualizer (right panel) ─── */
.led-viz {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.75rem;
  margin-bottom:1.5rem;
  padding:1rem;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:4px;
}
.led-label {
  font-size:.6rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--text3);
}
.led-strip {
  display:flex;
  gap:6px;
}
.led {
  width:14px;height:14px;border-radius:50%;
  background:var(--border2);
  transition:all .4s;
}
.led.on-A { background:var(--red);  box-shadow:0 0 10px var(--red), 0 0 20px rgba(255,68,85,.3); }
.led.on-C { background:var(--cyan); box-shadow:0 0 10px var(--cyan),0 0 20px rgba(0,255,200,.3); }
.led.on-X { background:var(--border2); }

/* ─── Footer ─── */
footer {
  border-top:1px solid var(--border);
  background:var(--bg2);
  padding:.5rem 1.5rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:.6rem;
  color:var(--text3);
  letter-spacing:.06em;
}
.footer-ws {
  display:flex;
  align-items:center;
  gap:.4rem;
}
.ws-dot {
  width:5px;height:5px;border-radius:50%;
  background:var(--red);
  transition:background .3s;
}
.ws-dot.connected { background:var(--green); animation:pulse 2s ease-in-out infinite; }

/* ─── Reconnect button ─── */
.reconnect-btn {
  padding:.25rem .6rem;
  border:1px solid var(--border2);
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  font-family:var(--mono);
  font-size:.6rem;
  border-radius:2px;
  letter-spacing:.08em;
  transition:all .15s;
}
.reconnect-btn:hover { border-color:var(--accent2); color:var(--accent); }

/* ─── Empty state ─── */
.empty-state {
  text-align:center;
  color:var(--text3);
  font-size:.7rem;
  padding:2rem 0;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

@media(max-width:900px){
  main { grid-template-columns:1fr; grid-template-rows:auto 1fr auto; height:auto; }
  .panel { border-right:none; border-bottom:1px solid var(--border); min-height:200px; }
  .center-panel { min-height:360px; }
}
</style>
</head>
<body>

<!-- ─── Header ─── -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8" cy="12" r="1.5" fill="var(--accent)"/>
        <circle cx="12" cy="8" r="1.5" fill="var(--accent)"/>
        <circle cx="16" cy="12" r="1.5" fill="var(--accent)"/>
        <circle cx="12" cy="16" r="1.5" fill="var(--accent)"/>
      </svg>
    </div>
    <div class="logo-text">STM32 <span>AI</span> Bridge</div>
  </div>
  <div class="header-right">
    <div class="badge fail" id="badge-stm32">
      <div class="dot"></div>
      <span id="badge-stm32-text">STM32 OFFLINE</span>
    </div>
    <div class="badge warn" id="badge-ws">
      <div class="dot"></div>
      <span>WS CONNECTING</span>
    </div>
    <button class="reconnect-btn" onclick="reconnectSerial()">↺ SERIAL</button>
  </div>
</header>

<!-- ─── Main ─── -->
<main>

  <!-- Left: Transcript log -->
  <div class="panel">
    <div class="panel-header">
      <div class="dot-accent"></div>
      Voice Transcript
    </div>
    <div class="panel-body" id="transcript-log">
      <div class="empty-state">Belum ada input suara</div>
    </div>
  </div>

  <!-- Center: Voice control -->
  <div class="center-panel">
    <!-- Waveform -->
    <div class="waveform" id="waveform">
      <div class="bar" style="height:28px"></div>
      <div class="bar" style="height:36px"></div>
      <div class="bar" style="height:44px"></div>
      <div class="bar" style="height:32px"></div>
      <div class="bar" style="height:20px"></div>
      <div class="bar" style="height:40px"></div>
      <div class="bar" style="height:28px"></div>
      <div class="bar" style="height:36px"></div>
      <div class="bar" style="height:24px"></div>
      <div class="bar" style="height:32px"></div>
    </div>

    <!-- Mic -->
    <div class="mic-ring">
      <button class="mic-btn" id="mic-btn" onclick="toggleListen()">
        <svg id="mic-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="13" rx="3"/>
          <path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
    </div>

    <!-- Status -->
    <div class="status-text" id="status-text">Klik mikrofon untuk mulai</div>

    <!-- Current command -->
    <div class="command-display">
      <div class="cmd-label">Perintah Terakhir</div>
      <div class="cmd-value" id="cmd-value">—</div>
      <div class="cmd-name" id="cmd-name">Menunggu input suara</div>
    </div>

    <!-- Manual buttons -->
    <div>
      <div class="cmd-label" style="text-align:center;margin-bottom:.5rem;">Kirim Manual</div>
      <div class="manual-cmds">
        <button class="cmd-btn A" onclick="sendManual('A')">A — PANIK</button>
        <button class="cmd-btn C" onclick="sendManual('C')">C — SANTAI</button>
        <button class="cmd-btn X" onclick="sendManual('X')">X — MATI</button>
      </div>
    </div>
  </div>

  <!-- Right: Serial monitor + LED -->
  <div class="panel">
    <div class="panel-header">
      <div class="dot-accent"></div>
      Serial Monitor
    </div>
    <div class="panel-body">
      <!-- LED Visualizer -->
      <div class="led-viz">
        <div class="led-label">LED Status — STM32</div>
        <div class="led-strip" id="led-strip">
          <div class="led" id="led0"></div>
          <div class="led" id="led1"></div>
          <div class="led" id="led2"></div>
          <div class="led" id="led3"></div>
          <div class="led" id="led4"></div>
          <div class="led" id="led5"></div>
          <div class="led" id="led6"></div>
          <div class="led" id="led7"></div>
        </div>
        <div class="led-label" id="led-mode-text">IDLE</div>
      </div>
      <!-- Serial log -->
      <div id="serial-log">
        <div class="empty-state">Menunggu koneksi serial...</div>
      </div>
    </div>
  </div>

</main>

<!-- ─── Footer ─── -->
<footer>
  <div class="footer-ws">
    <div class="ws-dot" id="ws-dot"></div>
    <span id="ws-status-text">WebSocket: menghubungkan...</span>
  </div>
  <span id="footer-port">PORT: —</span>
  <span>STM32 AI Voice Bridge v2.0</span>
</footer>

<script>
// ─── WebSocket ───
let ws = null;
let isListening = false;
let reconnectTimer = null;

function nowStr() {
  return new Date().toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('ws-dot').classList.add('connected');
    document.getElementById('ws-status-text').textContent = 'WebSocket: terhubung';
    const badge = document.getElementById('badge-ws');
    badge.className = 'badge ok';
    badge.innerHTML = '<div class="dot"></div><span>WS ONLINE</span>';
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('connected');
    document.getElementById('ws-status-text').textContent = 'WebSocket: terputus — menghubungkan ulang...';
    const badge = document.getElementById('badge-ws');
    badge.className = 'badge warn';
    badge.innerHTML = '<div class="dot"></div><span>WS OFFLINE</span>';
    reconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    handleMessage(msg);
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'init':
      updateSTM32Badge(msg.stm32_connected);
      document.getElementById('footer-port').textContent = `PORT: ${msg.serial_port}`;
      if (msg.is_listening) setListeningUI(true);
      break;

    case 'listening_started':
      setListeningUI(true);
      break;

    case 'listening_stopped':
      setListeningUI(false);
      break;

    case 'listening_pulse':
      // brief silence pulse — could animate waveform minimally
      break;

    case 'status':
      setStatus(msg.msg, isListening);
      break;

    case 'transcript':
      addTranscript(msg.text, null);
      addSerialLine('info', '→', `"${msg.text}"`);
      break;

    case 'ai_command':
      updateCommand(msg.command, msg.label);
      updateLED(msg.command);
      addSerialLine('tx', 'TX', msg.command);
      break;

    case 'stm32_response':
      addSerialLine('rx', 'RX', msg.response);
      updateTranscriptCmd(msg.command);
      break;

    case 'error':
      addSerialLine('err', 'ERR', msg.msg);
      setStatus(msg.msg, false);
      break;
  }
}

// ─── UI helpers ───
function updateSTM32Badge(connected) {
  const b = document.getElementById('badge-stm32');
  const t = document.getElementById('badge-stm32-text');
  b.className = connected ? 'badge ok' : 'badge fail';
  b.innerHTML = `<div class="dot"></div><span>STM32 ${connected ? 'ONLINE' : 'OFFLINE'}</span>`;
}

function setListeningUI(active) {
  isListening = active;
  const btn  = document.getElementById('mic-btn');
  const wave = document.getElementById('waveform');
  const icon = document.getElementById('mic-icon');

  btn.classList.toggle('active', active);
  wave.classList.toggle('active', active);

  if (active) {
    icon.setAttribute('stroke', 'var(--red)');
    setStatus('Mendengarkan... (ucapkan "keluar" untuk berhenti)', true);
  } else {
    icon.setAttribute('stroke', 'var(--accent)');
    setStatus('Klik mikrofon untuk mulai', false);
  }
}

function setStatus(text, active) {
  const el = document.getElementById('status-text');
  el.textContent = text;
  el.classList.toggle('active-text', active);
}

function updateCommand(cmd, name) {
  const val  = document.getElementById('cmd-value');
  const name2 = document.getElementById('cmd-name');
  val.className = `cmd-value ${cmd}`;
  val.textContent = cmd;
  name2.textContent = name;
}

function updateLED(cmd) {
  const leds = document.querySelectorAll('.led');
  const txt  = document.getElementById('led-mode-text');
  leds.forEach(l => l.className = 'led');

  if (cmd === 'A') {
    leds.forEach((l,i) => { if (i%2===0) l.classList.add('on-A'); });
    txt.textContent = 'MODE A — PANIK (MERAH)';
  } else if (cmd === 'C') {
    leds.forEach(l => l.classList.add('on-C'));
    txt.textContent = 'MODE C — SANTAI (CYAN)';
  } else {
    txt.textContent = 'MODE X — MATI';
  }
}

// ─── Transcript log ───
let lastTranscriptEl = null;

function addTranscript(text, cmd) {
  const log = document.getElementById('transcript-log');
  const empty = log.querySelector('.empty-state');
  if (empty) empty.remove();

  const entry = document.createElement('div');
  entry.className = 'transcript-entry';
  entry.innerHTML = `
    <div class="ts-time">${nowStr()}</div>
    <div class="ts-text">${escHtml(text)}</div>
  `;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
  lastTranscriptEl = entry;
}

function updateTranscriptCmd(cmd) {
  if (!lastTranscriptEl) return;
  lastTranscriptEl.classList.add(`cmd-${cmd}`);
  const info = {
    'A': 'PANIK / BAHAYA',
    'C': 'SANTAI / FOKUS',
    'X': 'MATI / TIDUR',
  };
  const badge = document.createElement('span');
  badge.className = 'ts-cmd';
  badge.textContent = `${cmd} — ${info[cmd] || cmd}`;
  lastTranscriptEl.querySelector('.ts-text').appendChild(document.createElement('br'));
  lastTranscriptEl.querySelector('.ts-text').appendChild(badge);
}

// ─── Serial monitor ───
function addSerialLine(type, dir, data) {
  const log = document.getElementById('serial-log');
  const empty = log.querySelector('.empty-state');
  if (empty) empty.remove();

  const line = document.createElement('div');
  line.className = `serial-line ${type}`;
  line.innerHTML = `
    <span class="sl-time">${nowStr()}</span>
    <span class="sl-dir">[${dir}]</span>
    <span class="sl-data">${escHtml(data)}</span>
  `;
  log.appendChild(line);

  // Keep last 200 lines
  while (log.children.length > 200) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

// ─── Controls ───
function toggleListen() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (isListening) {
    ws.send(JSON.stringify({action: 'stop_listen'}));
  } else {
    ws.send(JSON.stringify({action: 'start_listen'}));
  }
}

function sendManual(cmd) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({action: 'send_command', command: cmd}));
}

function reconnectSerial() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({action: 'reconnect_serial'}));
}

// ─── Init ───
connectWS();
</script>
